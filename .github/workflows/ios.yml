name: Build iOS App (.ipa)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets (React/Vite)
        run: npm run build

      - name: Add Capacitor iOS Platform
        run: npx cap add ios || npx cap sync ios

      - name: Build iOS App with Xcode
      - name: Build iOS App with Xcode
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath Build/ \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO


      - name: Package .app to .ipa
        run: |
          mkdir -p Payload
          mv Build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r app.ipa Payload

      - name: Upload .ipa Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-ipa
          path: app.ipa
